<h2>Ranking</h2>

<table *ngIf="ranking && ranking.length > 0"
       style="width:100%; border-collapse: collapse; margin-top: 20px;">

  <tr style="background-color: #f2f2f2;">
    <th style="padding:10px;">Posição</th>
    <th style="padding:10px;">Usuário</th>
    <th style="padding:10px;">Tentativas</th>
    <th style="padding:10px;">Resultado</th>
  </tr>

  <tr *ngFor="let item of ranking; let i = index"
      [style.background]="i === 0 ? '#fff3cd' : 'white'"
      style="text-align:center; border-bottom:1px solid #ddd;">

    <td style="padding:10px;">{{ i + 1 }}º</td>
    <td style="padding:10px;">{{ item.usuario }}</td>
    <td style="padding:10px;">{{ item.tentativas }}</td>
    <td style="padding:10px;">
      {{ item.venceu ? 'Vitória' : 'Derrota' }}
    </td>

  </tr>

</table>

<p *ngIf="!ranking || ranking.length === 0" style="margin-top: 20px;">
  Nenhum dado encontrado.
</p>

<button (click)="voltar()">Voltar</button>

<button (click)="logout()">Logout</button>
